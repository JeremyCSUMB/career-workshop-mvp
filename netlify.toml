[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"

[functions."workshop-analytics"]
  timeout = 60

[functions."workshop-profile"]
  timeout = 60

[functions."workshop-classify"]
  timeout = 60

# CORS headers for the function endpoint
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
